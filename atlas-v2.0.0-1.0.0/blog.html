<!-- AUTO BLOG SCRIPT -->

<script>

fetch('data/posts.json')

.then(response => response.json())

.then(posts => {

const blogList = document.getElementById('blog-list');

posts.forEach(post => {

const card = document.createElement('div');

card.className = "border p-6 rounded-lg hover:shadow-lg transition-shadow";

card.innerHTML = `

<span class="inline-block bg-green-light px-2 py-1 rounded text-sm font-body text-green">
${post.category}
</span>

<h3 class="font-body text-xl font-semibold text-primary dark:text-white mt-3">
${post.title}
</h3>

<p class="font-body text-primary dark:text-white mt-2">
${post.summary}
</p>

<div class="mt-3 text-sm text-secondary">
${post.date} • ${post.readTime}
</div>

<a href="github-actions-cicd.html" class="text-green font-semibold">
Read More →
</a>

`;

blogList.appendChild(card);

});

});

</script>
